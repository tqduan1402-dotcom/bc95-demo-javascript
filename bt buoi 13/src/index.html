<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/output.css" />
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body>
    <main class="p-96">
        <h1 class="text-3xl font-bold text-center mb-5">Tính điểm tuyển sinh</h1>

        <!-- bài 1: Tính điểm trung bình -->
        <section class="bg-gray-100 rounded-lg shadow-lg p-6">
            <form id="formXetTuyen" class="space-y-4">
                <div>
                    <label class="block font-medium mb-1">Điểm chuẩn</label>
                    <input id="diemChuan" type="number" step="0.01" name="diemChuan"
                        class="w-full border rounded-sm px-3 py-2" placeholder="Mời nhập điểm chuẩn" required>
                    <p id="errorDiemChuan" class="hidden text-red-400"></p>
                </div>

                <div class="grid grid-cols-3 gap-4">

                    <div>
                        <label class="block font-medium mb-1">Điểm môn 1</label>
                        <input id="diemMon1" type="number" step="0.01" name="diemMon1"
                            class="w-full border rounded-sm px-3 py-2" placeholder="Mời nhập điểm môn 1" required>
                        <p id="errorDiemMon1" class="hidden text-red-400"></p>
                    </div>

                    <div>
                        <label class="block font-medium mb-1">Điểm môn 2</label>
                        <input id="diemMon2" type="number" step="0.01" name="diemMon2"
                            class="w-full border rounded-sm px-3 py-2" placeholder="Mời nhập điểm môn 2" required>
                        <p id="errorDiemMon2" class="hidden text-red-400"></p>
                    </div>

                    <div>
                        <label class="block font-medium mb-1">Điểm môn 3</label>
                        <input id="diemMon3" type="number" step="0.01" name="diemMon3"
                            class="w-full border rounded-sm px-3 py-2" placeholder="Mời nhập điểm môn 3" required>
                        <p id="errorDiemMon3" class="hidden text-red-400"></p>
                    </div>
                </div>

                <!-- khu vực - đối tượng -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-medium mb-1">Khu vực</label>
                        <select id="khuVuc" name="khuVuc" class="w-full border rounded-sm px-3 py-2" required>
                            <option value="">Mời chọn khu vực</option>
                            <option value="A">Khu vực A</option>
                            <option value="B">Khu vực B</option>
                            <option value="C">Khu vực C</option>
                        </select>
                    </div>

                    <div>
                        <label class="block font-medium mb-1">Đối tượng</label>
                        <select id="doiTuong" name="doiTuong" class="w-full border rounded-sm px-3 py-2" required>
                            <option value="">Mời chọn đối tượng</option>
                            <option value="1">Đối tượng 1</option>
                            <option value="2">Đối tượng 2</option>
                            <option value="3">Đối tượng 3</option>
                        </select>
                    </div>
                </div>

                <button id="btnTinhDiem" type="submit" class="bg-green-400 rounded-md px-3 py-2">
                    Tính điểm trung bình
                </button>
            </form>
        </section>


        <!-- bài 2: tính tiền điện-->
         <section class="bg-gray-100 rounded-lg shadow-lg p-6 mt-5">
            <h1 class="text-3xl font-bold text-center mb-5 py-2">Tính tiền điện</h1>
            <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium">Họ tên người dùng</label>
            <input type="text" id="name" class="w-full p-2 border rounded-sm px-3 py-2" placeholder="Nhập tên">
        </div>
        <div>
            <label class="block text-sm font-medium">Số kW tiêu thụ</label>
            <input type="number" id="kw" class="w-full p-2 border rounded-sm px-3 py-2" placeholder="Nhập số kW">
        </div>
        <button onclick="tinhTienDien()" class="w-full bg-blue-500 rounded-md text-white px-4 py-2 hover:bg-blue-600">
            Tính Tiền Điện
        </button>
    </div>

    <div id="result" class="mt-6 p-4 bg-blue-50 dark:bg-slate-700 rounded-lg hidden text-blue-800 dark:text-blue-200">
        </div>
         </section>




         <!-- bài 3: tính thuế thu nhập cá nhân -->
          <section class="bg-gray-100 rounded-lg shadow-lg p-6 mt-5">
            <h1 class="text-3xl font-bold text-center mb-5 py-2">Tính thuế thu nhập cá nhân</h1>
            <form id="formThue" class="space-y-4">
                <div>
                    <label class="block font-medium mb-1">Họ và Tên</label>
                    <input
                        type="text"
                        id="txtHoTen"
                        class="w-full border rounded px-3 py-2"
                        placeholder="Mời bạn nhập họ tên"
                        required
                    >
                </div>

                <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block font-medium mb-1">Tổng thu nhập năm</label>
                    <input type="number" id="numTongThuNhap"  
                           class="w-full border rounded px-3 py-2"
                           placeholder="Ví dụ: 120"
                           required
                           >
                    <p>Đơn vị: triệu</p>
                </div>
                <div>
                    <label class="block font-medium mb-1">Số người phụ thuộc</label>
                    <input type="number"id="numPhuThuoc"
                           class="w-full border rounded px-3 py-2"
                           placeholder="Ví dụ: 2"
                           required>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-500 rounded-md text-white px-4 py-2 hover:bg-blue-600">
                Tính tiền thuế
            </button>
            </form>
            </form>
            <p id="KetQua" class="hidden mt-4 font-bold"></p>
          </section>




        <!-- bài 4: tính tiền cáp -->
          
        <section class="bg-gray-100 rounded-lg shadow-lg p-6 mt-5">
            <h1 class="text-3xl font-bold text-center mb-5 py-2">Tính tiền cáp</h1>
            <form id="formHoaDon" class="space-y-4">
                <!-- maKH -->
                <div>
                    <label class="block font-medium mb-1">Mã khách hàng</label>
                    <input
                        type="text"
                        id="maKH"
                        class="w-full border rounded px-3 py-2"
                        placeholder="Mời bạn nhập mã khách hàng"
                        required
                    >
                    <p id="errorMaKH" class="hidden text-red-400"></p>
                </div>
                <!-- Loại khách hàng -->
                <div>
                    <label class="block font-medium mb-1">Loại khách hàng</label>
                    <select id="loaiKH" class="w-full border rounded px-3 py-2">
                        <option value="">--Chọn loại khách hàng--</option>
                        <option value="nhaDan">Nhà dân</option>
                        <option value="doanhNghiep">Doanh nghiệp</option>
                    </select>
                    <p id="errorLoaiKH" class="hidden text-red-400"></p>
                </div>

                <!-- số kết nối (chỉ hiện khi chọn doanh nghiệp) -->
                <div id="wrapKetNoi" class="hidden">
                    <label class="block font-medium mb-1">Số kết nối</label>
                    <input
                        type="number"
                        id="soKetNoi"
                        min="1"
                        class="w-full border rounded px-3 py-2"
                        placeholder="Nhập số kết nối"
                    >
                    <p id="errorSoKetNoi" class="hidden text-red-400"></p>
                </div>

                <!-- số kênh cao cấp -->
                <div>
                    <label class="block font-medium mb-1">Số kênh cao cấp</label>
                    <input
                        type="text"
                        id="soKenhCaoCap"
                        class="w-full border rounded px-3 py-2"
                        min="0"
                        placeholder="Nhập số kênh cao cấp"
                    >
                    <p id="errorSoKenhCaoCap" class="hidden text-red-400"></p>
                </div>

                <!-- nút tính tiền hóa đơn -->
                <button type="submit" class="w-full bg-blue-500 rounded-md text-white px-4 py-2 hover:bg-blue-600">
                    Tính tiền cáp
                </button>
            </form>
            <p id="resultHoaDon" class="hidden mt-4 font-bold"></p>
        </section>
    </main>
    <script src="../js/bai1.js"></script>
    <script src="../js/bai2.js"></script>
    <script src="../js/bai3.js"></script>
    <script src="../js/bai4.js"></script>
  </body>
</html>
